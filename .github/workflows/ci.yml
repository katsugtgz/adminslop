name: CI

on:
  pull_request:
  push:
    branches: [main]

# All secret values are either GitHub secret references or obviously-fake
# placeholders (sk_test_dummy, dev-role credentials from .env.example). No real
# credentials live in this file.
env:
  WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY || 'sk_test_dummy' }}
  WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID || 'test_client_dummy' }}
  WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD || 'dummy_cookie_password_for_ci_build_only_not_real' }}
  # Postgres service-container credentials. Matches docker/init.sql + .env.example
  # dev defaults (app_user is a non-superuser role so RLS is enforced).
  DATABASE_URL: postgresql://app_user:app_password@localhost:5432/eduadmin
  DATABASE_MIGRATOR_URL: postgresql://postgres:postgres@localhost:5432/eduadmin

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eduadmin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d eduadmin"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      # Mirrors docker/init.sql: creates the non-superuser app role so the app
      # connection (DATABASE_URL) enforces RLS instead of bypassing it.
      - name: Provision app_user role
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d eduadmin -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_user') THEN CREATE ROLE app_user WITH LOGIN PASSWORD 'app_password'; END IF; END \$\$;"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npm run build

  # Minimal e2e smoke — runs in parallel with build-and-test. No WorkOS
  # secrets required: the smoke tests (e2e/ci-smoke.spec.ts) exercise only
  # unauthenticated routes (/health 200, /dashboard renders PembatasanAkses
  # auth gate). The auth-gated tracer in mvp-tracer.spec.ts skips gracefully
  # when E2E_AUTH_EMAIL / E2E_AUTH_PASSWORD are absent, so the full suite
  # stays green without credentials.
  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      # AuthKit middleware needs a redirect URI to construct the sign-in URL.
      # This is a public value (no secret) — it matches the callback route in
      # src/middleware.ts matcher (/api/auth/:path*).
      NEXT_PUBLIC_WORKOS_REDIRECT_URI: http://localhost:3000/api/auth/callback

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Install only the chromium browser (playwright.config.ts uses a single
      # chromium project). --with-deps installs required OS libraries.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run e2e
