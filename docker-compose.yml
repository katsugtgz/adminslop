services:
  db:
    image: postgres:17-alpine
    container_name: eduadmin-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eduadmin
    ports:
      - "5432:5432"
    volumes:
      - eduadmin_pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eduadmin"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  eduadmin_pgdata:
